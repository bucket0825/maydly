<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>maydly — 관리자</title>
<style>
:root{
  --bg:#fefefe;--bg2:#f7f9f7;--sf:#fff;--sf2:#f5f8f5;--sf3:#eef3ee;
  --bd:#e2ebe2;--bd2:#cddccd;
  --tx:#2a3a2a;--mu:#7a9a7a;--mu2:#5a7a5a;
  --R:#7ab87a;--Rl:rgba(122,184,122,.12);--Rd:#5a9a5a;
  --ok:#6ab87a;--ng:#c86060;--r:8px;
  --sh:0 2px 12px rgba(42,58,42,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--tx);min-height:100vh;}

/* ── 랜딩 ── */
#landingScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;}
.landing-deco{font-size:48px;}
.landing-logo{font-size:42px;font-weight:300;letter-spacing:2px;}
.landing-logo em{font-style:italic;}
.landing-sub{font-size:13px;letter-spacing:4px;color:var(--mu);text-transform:uppercase;}
.landing-btn{margin-top:24px;padding:14px 48px;background:var(--R);color:#fff;border:none;border-radius:40px;font-size:16px;cursor:pointer;}

/* ── PIN ── */
#pinScreen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;}
.pin-title{font-size:18px;color:var(--mu);}
.pin-dots{display:flex;gap:16px;margin:8px 0;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--R);}
.pin-dot.on{background:var(--R);}
.pin-pad{display:grid;grid-template-columns:repeat(3,80px);gap:12px;margin-top:8px;}
.pin-key{height:64px;border-radius:50%;border:2px solid var(--bd2);background:var(--sf);font-size:22px;cursor:pointer;transition:.15s;}
.pin-key:hover{background:var(--sf3);}
.pin-key.del{font-size:20px;}
#pinErr{color:var(--ng);font-size:14px;height:20px;}

/* ── 메인 앱 ── */
#mainApp{display:none;flex-direction:column;min-height:100vh;}
.app-header{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--sf);border-bottom:1px solid var(--bd);flex-wrap:wrap;}
.app-logo{font-size:22px;font-weight:300;letter-spacing:1px;font-style:italic;margin-right:8px;}
.header-nav{display:flex;align-items:center;gap:8px;flex:1;}
.nav-btn{background:none;border:1px solid var(--bd2);border-radius:6px;padding:4px 10px;font-size:18px;cursor:pointer;color:var(--tx);}
#navLabel{font-size:16px;font-weight:600;min-width:120px;text-align:center;}
.today-btn{background:var(--Rl);border:1px solid var(--R);border-radius:6px;padding:4px 12px;font-size:13px;cursor:pointer;color:var(--mu2);}
.view-tabs{display:flex;gap:4px;}
.view-tab{background:none;border:1px solid var(--bd2);border-radius:6px;padding:4px 14px;font-size:13px;cursor:pointer;color:var(--mu);}
.view-tab.active{background:var(--R);color:#fff;border-color:var(--R);}
.sync-btn{background:none;border:1px solid var(--bd2);border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;color:var(--mu2);}

/* ── 레이아웃 ── */
.cal-wrap{display:flex;flex:1;min-height:0;}
.sidebar{width:180px;background:var(--sf);border-right:1px solid var(--bd);padding:16px 12px;overflow-y:auto;flex-shrink:0;}
.sidebar-title{font-size:12px;color:var(--mu);letter-spacing:1px;margin-bottom:10px;text-transform:uppercase;}
.label-item{display:flex;align-items:center;gap:8px;padding:5px 4px;cursor:pointer;border-radius:6px;font-size:13px;}
.label-item:hover{background:var(--sf3);}
.label-cb{accent-color:var(--R);}
.label-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.label-name{color:var(--tx);}
.cal-main{flex:1;overflow:auto;padding:16px;}

/* ── 월간 그리드 ── */
#calGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--bd);}
.cal-dow{background:var(--sf2);text-align:center;padding:6px;font-size:12px;font-weight:600;color:var(--mu);letter-spacing:1px;}
.cal-cell{background:var(--sf);min-height:120px;padding:4px;position:relative;cursor:pointer;overflow:hidden;display:flex;flex-direction:column;}
.cal-cell:hover{background:var(--sf2);}
.cal-cell.other{background:var(--bg2);}
.cal-cell.other .cell-num{color:#bbb;}
.cal-cell.today{background:#f0fff4;}
.cell-num{font-size:13px;font-weight:500;padding:2px 4px;width:24px;text-align:center;border-radius:50%;}
.cell-num.today-num{background:var(--R);color:#fff;}
.cal-cell.sat .cell-num{color:#60a5fa;}
.cal-cell.sun .cell-num{color:#f87171;}

/* ── 멀티데이 바 (종일/다일 — 진한 바) ── */
.multiday-bars{display:flex;flex-direction:column;gap:2px;margin:2px 0;}
.mbar{height:18px;border-radius:2px;opacity:0.9;display:flex;align-items:center;overflow:hidden;font-size:11px;font-weight:600;color:#fff;position:relative;margin:0 -4px;}
.mbar-start{border-radius:9px 2px 2px 9px;margin-left:0;}
.mbar-end{border-radius:2px 9px 9px 2px;}
.mbar-start.mbar-end{border-radius:9px;}
.mbar-label{padding:0 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}

/* ── 시간 일정 chip (연한 배경) ── */
.ev-chip{
  font-size:11px;padding:2px 6px;border-radius:4px;
  background:color-mix(in srgb,var(--ec) 18%,#fff);
  color:color-mix(in srgb,var(--ec) 70%,#333);
  border-left:3px solid var(--ec);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:1px;cursor:pointer;
}
.ev-more{font-size:11px;color:var(--mu2);padding:1px 4px;cursor:pointer;font-weight:600;}

/* ── 주간 뷰 ── */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
.week-col{background:var(--sf);border-radius:var(--r);padding:8px;min-height:200px;}
.week-col.today{background:#f0fff4;border:1px solid var(--R);}
.week-dow{font-size:12px;color:var(--mu);text-align:center;font-weight:600;margin-bottom:4px;}
.week-date{font-size:18px;font-weight:600;text-align:center;margin-bottom:8px;}
.week-date.today-num{background:var(--R);color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;}
.week-ev{padding:4px 6px;border-radius:4px;margin-bottom:4px;font-size:12px;
  background:color-mix(in srgb,var(--ec) 15%,#fff);
  border-left:3px solid var(--ec);}
.week-ev.allday{background:var(--ec);color:#fff;border-left:none;font-weight:600;opacity:0.9;}
.ev-time{font-size:10px;color:inherit;opacity:0.75;display:block;margin-bottom:2px;}
.ev-title{display:block;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ── 일간 뷰 ── */
.day-view{max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:8px;}
.day-empty{text-align:center;color:var(--mu);padding:48px;font-size:15px;}
.day-ev{display:flex;border-radius:var(--r);overflow:hidden;background:var(--sf);box-shadow:var(--sh);}
.day-ev.allday .day-ev-bar{width:6px;background:var(--ec);}
.day-ev .day-ev-bar{width:4px;background:color-mix(in srgb,var(--ec) 60%,#fff);}
.day-ev-body{padding:10px 14px;flex:1;}
.day-ev-title{font-size:15px;font-weight:600;margin-bottom:4px;}
.day-ev-meta{font-size:12px;color:var(--mu);}
.day-ev.allday{border-left:4px solid var(--ec);}
.day-ev.allday .day-ev-title{color:color-mix(in srgb,var(--ec) 60%,#222);}

/* ── Toast ── */
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#2a3a2a;color:#fff;padding:10px 24px;border-radius:40px;font-size:14px;opacity:0;transition:.3s;pointer-events:none;z-index:9999;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- 랜딩 -->
<div id="landingScreen">
  <div class="landing-deco">🌿</div>
  <div class="landing-logo"><em>maydly</em></div>
  <div class="landing-sub">ADMIN CALENDAR</div>
  <button class="landing-btn" onclick="showAdminLogin()">관리자로 시작하기</button>
</div>

<!-- PIN -->
<div id="pinScreen">
  <div class="landing-logo"><em>maydly</em></div>
  <div class="pin-title">PIN 입력</div>
  <div class="pin-dots">
    <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-key" onclick="pinInput(1)">1</button>
    <button class="pin-key" onclick="pinInput(2)">2</button>
    <button class="pin-key" onclick="pinInput(3)">3</button>
    <button class="pin-key" onclick="pinInput(4)">4</button>
    <button class="pin-key" onclick="pinInput(5)">5</button>
    <button class="pin-key" onclick="pinInput(6)">6</button>
    <button class="pin-key" onclick="pinInput(7)">7</button>
    <button class="pin-key" onclick="pinInput(8)">8</button>
    <button class="pin-key" onclick="pinInput(9)">9</button>
    <button class="pin-key" style="visibility:hidden"></button>
    <button class="pin-key" onclick="pinInput(0)">0</button>
    <button class="pin-key del" onclick="pinDel()">⌫</button>
  </div>
  <div id="pinErr"></div>
  <button onclick="goLanding()" style="margin-top:16px;background:none;border:none;color:var(--mu);cursor:pointer;font-size:13px;">← 돌아가기</button>
</div>

<!-- 메인 앱 -->
<div id="mainApp" style="display:none;flex-direction:column;min-height:100vh;">
  <div class="app-header">
    <div class="app-logo"><em>maydly</em></div>
    <div class="header-nav">
      <button class="nav-btn" onclick="navPrev()">‹</button>
      <div class="nav-label" id="navLabel"></div>
      <button class="nav-btn" onclick="navNext()">›</button>
      <button class="today-btn" onclick="goToday()">오늘</button>
    </div>
    <div class="view-tabs">
      <button class="view-tab active" id="tab-month" onclick="setView('month')">월</button>
      <button class="view-tab" id="tab-week" onclick="setView('week')">주</button>
      <button class="view-tab" id="tab-day" onclick="setView('day')">일</button>
    </div>
    <button class="sync-btn" id="syncBtn" onclick="syncToGithub()">💾 저장</button>
  </div>
  <div class="cal-wrap">
    <div class="sidebar">
      <div class="sidebar-title">라벨 필터</div>
      <div id="labelFilter"></div>
    </div>
    <div class="cal-main">
      <div id="calGrid"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="admin.js"></script>
</body>
</html>
