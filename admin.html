<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>maydly 관리자</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#f2f4f0;--sf:#fff;--sf2:#f7f9f6;--bd:#e0e8de;--bd2:#c8d8c4;--tx:#1e2e1e;--mu:#6a8a6a;--mu2:#4a6a4a;--R:#5ab87a;--Rd:#3a9a5a;--Rl:rgba(90,184,122,.12);--ng:#e05050;--ng2:rgba(224,80,80,.1);--safe-bottom:env(safe-area-inset-bottom,0px)}
body{font-family:-apple-system,'Pretendard','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;max-width:480px;margin:0 auto}
#pinScreen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:40px}
.pin-logo{font-family:Georgia,serif;font-style:italic;font-size:28px;color:var(--mu2);letter-spacing:2px}
.pin-sub{font-size:12px;color:var(--mu);margin-top:-16px}
.pin-dots{display:flex;gap:12px;margin:8px 0}
.pin-dot{width:12px;height:12px;border-radius:50%;background:var(--bd2);transition:background .15s}
.pin-dot.on{background:var(--R)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:260px}
.pin-btn{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:18px;font-size:22px;font-weight:500;color:var(--tx);cursor:pointer;text-align:center}
.pin-btn:active{background:var(--sf2)}
.pin-btn.del{font-size:18px;color:var(--mu)}
.pin-err{font-size:12px;color:var(--ng);height:16px;text-align:center}
.hdr{position:sticky;top:0;z-index:100;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px}
.hdr-logo{font-family:Georgia,serif;font-style:italic;font-size:17px;color:var(--mu2);letter-spacing:1px}
.hdr-badge{font-size:10px;background:var(--Rl);color:var(--Rd);padding:2px 8px;border-radius:10px;font-weight:700}
.sync-btn{background:var(--R);border:none;border-radius:10px;color:#fff;font-size:12px;font-weight:700;padding:7px 14px;cursor:pointer}
.sync-btn.loading{background:var(--bd2);color:var(--mu)}
.mon-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px}
.mon-label{font-size:18px;font-weight:700}
.mon-arrow{background:var(--sf);border:1px solid var(--bd);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--mu2)}
.cal-wrap{padding:0 12px 12px}
.dow-hdr{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.dow-lbl{text-align:center;font-size:10px;color:var(--mu);font-weight:700;padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.day-cell{background:var(--sf);border-radius:10px;padding:6px 4px 8px;min-height:68px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.day-cell:active{background:var(--sf2)}
.day-cell.dim{opacity:.3;pointer-events:none}
.day-cell.today .day-num{background:var(--R);color:#fff;border-radius:50%}
.day-num{font-size:11px;font-weight:600;color:var(--tx);width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.day-num.sun{color:#e05050}.day-num.sat{color:#5080e0}
.day-chips{display:flex;flex-direction:column;gap:2px;width:100%;align-items:center}
.day-chip{font-size:7px;font-weight:700;padding:1px 5px;border-radius:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90%;text-align:center}
.chip-unavail{background:#fde;color:#c04040}.chip-avail{background:rgba(90,184,122,.18);color:#2a7a4a}
.chip-partial{background:rgba(255,180,0,.18);color:#8a6000}.chip-full-ng{background:rgba(224,80,80,.12);color:#c04040}
.sheet-bg{position:fixed;inset:0;background:rgba(20,30,20,.4);z-index:200;display:none;backdrop-filter:blur(2px)}
.sheet-bg.on{display:block}
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--sf);border-radius:20px 20px 0 0;z-index:201;padding:0 0 calc(20px + var(--safe-bottom));max-height:90vh;overflow-y:auto;display:none}
.sheet-handle{width:36px;height:4px;background:var(--bd2);border-radius:2px;margin:12px auto 16px}
.sheet-title{font-size:16px;font-weight:700;padding:0 20px 14px;border-bottom:1px solid var(--bd)}
.sheet-date{font-size:12px;color:var(--mu);font-weight:400;margin-left:8px}
.unavail-row{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bd)}
.unavail-label span:first-child{font-size:14px;font-weight:600;display:block}
.unavail-label span:last-child{font-size:11px;color:var(--mu);display:block;margin-top:2px}
.toggle{width:48px;height:28px;border-radius:14px;background:var(--bd2);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--ng)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.toggle.on::after{transform:translateX(20px)}
.slots-section{padding:14px 20px}
.slots-label{font-size:11px;font-weight:700;color:var(--mu);margin-bottom:10px;letter-spacing:.5px}
.slot-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-radius:12px;border:1.5px solid var(--bd);margin-bottom:8px;cursor:pointer;background:var(--sf)}
.slot-row.avail{border-color:var(--R);background:var(--Rl)}
.slot-row.blocked{border-color:#e0c0c0;background:var(--ng2)}
.slot-time{font-size:15px;font-weight:600}
.slot-status{font-size:11px;font-weight:700}
.slot-row.avail .slot-status{color:var(--Rd)}.slot-row.blocked .slot-status{color:var(--ng)}
.label-section{padding:0 20px 6px;border-top:1px solid var(--bd);margin-top:4px}
.label-section .slots-label{padding-top:14px}
.label-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.label-chip{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;border:1.5px solid var(--bd);cursor:pointer;background:var(--sf)}
.label-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.label-name{font-size:12px;font-weight:600}
.memo-section{padding:12px 20px 16px}
.memo-input{width:100%;border:1.5px solid var(--bd);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--tx);background:var(--sf);resize:none;font-family:inherit;min-height:60px}
.memo-input:focus{outline:none;border-color:var(--R)}
.save-row{padding:0 20px 4px;display:flex;gap:10px}
.save-btn{flex:1;background:var(--R);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;padding:15px;cursor:pointer}
.save-btn:active{background:var(--Rd)}
.clear-btn{background:var(--sf);border:1.5px solid var(--bd);border-radius:12px;color:var(--mu);font-size:13px;font-weight:600;padding:15px 18px;cursor:pointer}
.toast{position:fixed;bottom:calc(30px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:var(--tx);color:#fff;padding:10px 22px;border-radius:30px;font-size:12px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
</style>
</head>
<body>
<div id="pinScreen">
  <div class="pin-logo">maydly</div>
  <div class="pin-sub">관리자 로그인</div>
  <div class="pin-dots">
    <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-err" id="pinErr"></div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pi('1')">1</button><button class="pin-btn" onclick="pi('2')">2</button><button class="pin-btn" onclick="pi('3')">3</button>
    <button class="pin-btn" onclick="pi('4')">4</button><button class="pin-btn" onclick="pi('5')">5</button><button class="pin-btn" onclick="pi('6')">6</button>
    <button class="pin-btn" onclick="pi('7')">7</button><button class="pin-btn" onclick="pi('8')">8</button><button class="pin-btn" onclick="pi('9')">9</button>
    <button class="pin-btn" style="visibility:hidden"></button><button class="pin-btn" onclick="pi('0')">0</button><button class="pin-btn del" onclick="pd()">⌫</button>
  </div>
</div>
<div id="mainApp" style="display:none">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:8px">
      <div class="hdr-logo">maydly</div><div class="hdr-badge">관리자</div>
    </div>
    <button class="sync-btn" id="syncBtn" onclick="sync()">💾 저장</button>
  </div>
  <div class="mon-nav">
    <button class="mon-arrow" onclick="chM(-1)">&#8249;</button>
    <div class="mon-label" id="monLabel"></div>
    <button class="mon-arrow" onclick="chM(1)">&#8250;</button>
  </div>
  <div class="cal-wrap">
    <div class="dow-hdr">
      <div class="dow-lbl" style="color:#e05050">일</div><div class="dow-lbl">월</div><div class="dow-lbl">화</div>
      <div class="dow-lbl">수</div><div class="dow-lbl">목</div><div class="dow-lbl">금</div>
      <div class="dow-lbl" style="color:#5080e0">토</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>
<div class="sheet-bg" id="sheetBg" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheetTitle"></div>
  <div class="unavail-row">
    <div class="unavail-label"><span>종일 예약 불가</span><span>휴무 / 외부 촬영 등 하루 전체 불가</span></div>
    <div class="toggle" id="unavailToggle" onclick="togU()"></div>
  </div>
  <div class="slots-section" id="slotsSection">
    <div class="slots-label">예약 가능 타임</div><div id="slotRows"></div>
  </div>
  <div class="label-section">
    <div class="slots-label">라벨</div><div class="label-grid" id="labelGrid"></div>
  </div>
  <div class="memo-section">
    <div class="slots-label" style="margin-bottom:8px">메모</div>
    <textarea class="memo-input" id="memoInput" placeholder="예: 합주 있음, 오전 외출 등"></textarea>
  </div>
  <div class="save-row">
    <button class="clear-btn" onclick="clearDay()">초기화</button>
    <button class="save-btn" onclick="saveDay()">확인</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="./admin.js?v=2"></script>
</body>
</html>
