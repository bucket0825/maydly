<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>maydly 관리자</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f2f4f0;--sf:#fff;--sf2:#f7f9f6;
  --bd:#e0e8de;--bd2:#c8d8c4;
  --tx:#1e2e1e;--mu:#6a8a6a;--mu2:#4a6a4a;
  --R:#5ab87a;--Rd:#3a9a5a;--Rl:rgba(90,184,122,.12);
  --ng:#e05050;--ng2:rgba(224,80,80,.08);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
body{font-family:-apple-system,'Pretendard',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;max-width:480px;margin:0 auto}

/* PIN */
#pinScreen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:40px}
.pin-logo{font-family:Georgia,serif;font-style:italic;font-size:28px;color:var(--mu2);letter-spacing:2px}
.pin-sub{font-size:12px;color:var(--mu);margin-top:-16px}
.pin-dots{display:flex;gap:12px;margin:8px 0}
.pin-dot{width:12px;height:12px;border-radius:50%;background:var(--bd2);transition:background .15s}
.pin-dot.on{background:var(--R)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:260px}
.pin-btn{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:18px;font-size:22px;font-weight:500;color:var(--tx);cursor:pointer;text-align:center}
.pin-btn:active{background:var(--sf2)}
.pin-btn.del{font-size:18px;color:var(--mu)}
.pin-err{font-size:12px;color:var(--ng);height:16px;text-align:center}

/* 헤더 */
.hdr{position:sticky;top:0;z-index:100;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px}
.hdr-logo{font-family:Georgia,serif;font-style:italic;font-size:17px;color:var(--mu2);letter-spacing:1px}
.hdr-badge{font-size:10px;background:var(--Rl);color:var(--Rd);padding:2px 8px;border-radius:10px;font-weight:700}
.sync-btn{background:var(--R);border:none;border-radius:10px;color:#fff;font-size:12px;font-weight:700;padding:7px 14px;cursor:pointer}
.sync-btn.loading{background:var(--bd2);color:var(--mu)}

/* 월 네비 */
.mon-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px}
.mon-label{font-size:18px;font-weight:700;color:var(--tx)}
.mon-arrow{background:var(--sf);border:1px solid var(--bd);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--mu2)}

/* 캘린더 — 타임트리 스타일 */
.cal-wrap{padding:0 8px 12px}
.dow-hdr{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:2px}
.dow-lbl{text-align:center;font-size:10px;color:var(--mu);font-weight:700;padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--bd)}
.day-cell{background:var(--sf);padding:4px 3px 6px;min-height:80px;cursor:pointer;display:flex;flex-direction:column;gap:2px}
.day-cell:active{background:var(--sf2)}
.day-cell.dim{background:#f8f9f8}
.day-cell.dim .day-num{opacity:.3}
.day-cell.today .day-num{background:var(--R);color:#fff;border-radius:50%}
.day-num{font-size:11px;font-weight:600;color:var(--tx);width:20px;height:20px;display:flex;align-items:center;justify-content:center;margin-bottom:1px}
.day-num.sun{color:#e05050}
.day-num.sat{color:#5080e0}
.day-evs{display:flex;flex-direction:column;gap:2px;flex:1}

/* 이벤트 칩 - 타임트리 스타일 */
.ev-allday{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-slot{font-size:8px;padding:2px 4px;border-radius:3px;display:flex;align-items:center;gap:2px;overflow:hidden}
.ev-time{color:var(--mu);font-size:7px;flex-shrink:0}
.ev-title{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ev-blocked{background:rgba(224,80,80,.08);border-left:3px solid #e05050}

/* 시트 */
.sheet-bg{position:fixed;inset:0;background:rgba(20,30,20,.4);z-index:200;display:none;backdrop-filter:blur(2px)}
.sheet-bg.on{display:block}
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--sf);border-radius:20px 20px 0 0;z-index:201;padding:0 0 calc(20px + var(--safe-bottom));max-height:92vh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;background:var(--bd2);border-radius:2px;margin:12px auto 16px}
.sheet-title{font-size:16px;font-weight:700;padding:0 20px 14px;border-bottom:1px solid var(--bd)}
.sheet-date{font-size:12px;color:var(--mu);font-weight:400;margin-left:8px}

/* 종일 불가 토글 */
.unavail-row{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--bd)}
.unavail-label span:first-child{font-size:14px;font-weight:600;color:var(--tx);display:block}
.unavail-label span:last-child{font-size:11px;color:var(--mu);display:block;margin-top:2px}
.toggle{width:48px;height:28px;border-radius:14px;background:var(--bd2);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--ng)}
.toggle::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.toggle.on::after{transform:translateX(20px)}

/* 종일 불가 제목/라벨 */
#unavailExtra{padding:12px 20px 0;border-bottom:1px solid var(--bd)}
.field-label{font-size:11px;font-weight:700;color:var(--mu);margin-bottom:8px;letter-spacing:.4px}
.title-input{width:100%;border:1.5px solid var(--bd);border-radius:10px;padding:10px 14px;font-size:15px;color:var(--tx);background:var(--sf);font-family:inherit;margin-bottom:12px}
.title-input:focus{outline:none;border-color:var(--R)}

/* 슬롯 목록 */
.slots-section{padding:14px 20px}
.slot-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;border:1px solid var(--bd);margin-bottom:8px;cursor:pointer;transition:background .1s}
.slot-item:active{background:var(--sf2)}
.slot-item-time{font-size:13px;font-weight:700;color:var(--tx);min-width:90px}
.slot-item-info{flex:1}
.slot-item-title{font-size:13px;font-weight:600;color:var(--tx)}
.slot-item-status{font-size:11px;margin-top:1px}
.slot-item-arrow{font-size:18px;color:var(--bd2)}

/* 슬롯 편집 패널 */
#slotEditPanel{padding:0 20px;border-top:2px solid var(--R);margin-top:4px}
.slot-edit-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 0 12px}
.slot-edit-time{font-size:16px;font-weight:700;color:var(--R)}
.slot-edit-close{background:none;border:none;font-size:22px;color:var(--mu);cursor:pointer;padding:0}
.avail-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0 14px;border-bottom:1px solid var(--bd);margin-bottom:14px}
.avail-row span{font-size:14px;font-weight:600;color:var(--tx)}

/* 라벨 */
.label-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.label-chip{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;border:1.5px solid var(--bd);cursor:pointer;background:var(--sf)}
.label-chip.selected{border-width:2px}
.label-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.label-name{font-size:12px;font-weight:600;color:var(--tx)}

/* 메모 */
.memo-input{width:100%;border:1.5px solid var(--bd);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--tx);background:var(--sf);resize:none;font-family:inherit;min-height:56px;margin-bottom:14px}
.memo-input:focus{outline:none;border-color:var(--R)}

/* 버튼행 */
.save-row{display:flex;gap:10px;padding:4px 0 8px}
.save-btn{flex:1;background:var(--R);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;padding:14px;cursor:pointer}
.save-btn:active{background:var(--Rd)}
.clear-btn{background:var(--sf);border:1.5px solid var(--bd);border-radius:12px;color:var(--mu);font-size:13px;font-weight:600;padding:14px 16px;cursor:pointer}
.day-save-row{padding:14px 20px 4px;display:flex;gap:10px;border-top:1px solid var(--bd);margin-top:8px}

/* 토스트 */
.toast{position:fixed;bottom:calc(30px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:var(--tx);color:#fff;padding:10px 22px;border-radius:30px;font-size:12px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
</style>
</head>
<body>

<!-- PIN -->
<div id="pinScreen">
  <div class="pin-logo">maydly</div>
  <div class="pin-sub">관리자 로그인</div>
  <div class="pin-dots">
    <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-err" id="pinErr"></div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinInput('1')">1</button>
    <button class="pin-btn" onclick="pinInput('2')">2</button>
    <button class="pin-btn" onclick="pinInput('3')">3</button>
    <button class="pin-btn" onclick="pinInput('4')">4</button>
    <button class="pin-btn" onclick="pinInput('5')">5</button>
    <button class="pin-btn" onclick="pinInput('6')">6</button>
    <button class="pin-btn" onclick="pinInput('7')">7</button>
    <button class="pin-btn" onclick="pinInput('8')">8</button>
    <button class="pin-btn" onclick="pinInput('9')">9</button>
    <button class="pin-btn" style="visibility:hidden"></button>
    <button class="pin-btn" onclick="pinInput('0')">0</button>
    <button class="pin-btn del" onclick="pinDel()">&#9003;</button>
  </div>
</div>

<!-- 메인 -->
<div id="mainApp" style="display:none">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:8px">
      <div class="hdr-logo">maydly</div>
      <div class="hdr-badge">관리자</div>
    </div>
    <button class="sync-btn" id="syncBtn" onclick="syncToGithub()">&#128190; 저장</button>
  </div>

  <div class="mon-nav">
    <button class="mon-arrow" onclick="chMonth(-1)">&#8249;</button>
    <div class="mon-label" id="monLabel"></div>
    <button class="mon-arrow" onclick="chMonth(1)">&#8250;</button>
  </div>

  <div class="cal-wrap">
    <div class="dow-hdr">
      <div class="dow-lbl" style="color:#e05050">일</div>
      <div class="dow-lbl">월</div><div class="dow-lbl">화</div>
      <div class="dow-lbl">수</div><div class="dow-lbl">목</div>
      <div class="dow-lbl">금</div>
      <div class="dow-lbl" style="color:#5080e0">토</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<!-- 시트 배경 -->
<div class="sheet-bg" id="sheetBg" onclick="closeSheet()"></div>

<!-- 날짜 편집 시트 -->
<div class="sheet" id="sheet" style="display:none">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheetTitle"></div>

  <!-- 종일 불가 -->
  <div class="unavail-row">
    <div class="unavail-label">
      <span>종일 예약 불가</span>
      <span>휴무 / 외부 촬영 등 하루 전체 불가</span>
    </div>
    <div class="toggle" id="unavailToggle" onclick="toggleUnavail()"></div>
  </div>

  <!-- 종일 불가 제목/라벨 -->
  <div id="unavailExtra" style="display:none">
    <div class="field-label">일정 제목</div>
    <input class="title-input" id="unavailTitle" type="text" placeholder="예: 하이브 상업 촬영, 외부 행사">
    <div class="field-label">라벨</div>
    <div class="label-grid" id="unavailLabelGrid"></div>
  </div>

  <!-- 타임 슬롯 목록 -->
  <div class="slots-section" id="slotsSection">
    <div class="field-label">타임별 일정</div>
    <div id="slotRows"></div>
  </div>

  <!-- 슬롯 편집 패널 -->
  <div id="slotEditPanel" style="display:none">
    <div class="slot-edit-hdr">
      <div class="slot-edit-time" id="slotEditTime"></div>
      <button class="slot-edit-close" onclick="cancelSlotEdit()">&#10005;</button>
    </div>

    <div class="field-label">고객명 / 일정 제목</div>
    <input class="title-input" id="slotTitle" type="text" placeholder="예: 김민정님, 야외 CF 촬영">

    <div class="avail-row">
      <span>예약 불가 처리</span>
      <div class="toggle" id="slotAvailToggle" onclick="toggleSlotAvail()"></div>
    </div>

    <div class="field-label">라벨</div>
    <div class="label-grid" id="slotLabelGrid"></div>

    <div class="field-label">메모</div>
    <textarea class="memo-input" id="slotMemo" placeholder="예: 강남 스튜디오, 헤어 포함"></textarea>

    <div class="save-row">
      <button class="clear-btn" onclick="clearSlotEdit()">초기화</button>
      <button class="save-btn" onclick="saveSlotEdit()">저장</button>
    </div>
  </div>

  <!-- 날짜 전체 저장/초기화 -->
  <div class="day-save-row">
    <button class="clear-btn" onclick="clearDay()">하루 초기화</button>
    <button class="save-btn" onclick="saveDay()">확인</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="./admin.js?v=5"></script>
</body>
</html>
