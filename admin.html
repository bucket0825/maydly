<!-- 관리자 전용 파일 - 일반 공개 금지 -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>maydly — 관리자</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fefefe;--bg2:#f7f9f7;--sf:#fff;--sf2:#f5f8f5;--sf3:#eef3ee;
  --bd:#e2ebe2;--bd2:#cddccd;
  --tx:#2a3a2a;--mu:#7a9a7a;--mu2:#5a7a5a;
  --R:#7ab87a;--Rl:rgba(122,184,122,.1);--Rd:#5a9a5a;
  --ok:#6ab87a;--wait:#c8a456;--ng:#c86060;
  --r:8px;
}
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&display=swap');
body{font-family:-apple-system,'Pretendard','Apple SD Gothic Neo',sans-serif;height:100vh;overflow:hidden;background:var(--bg);color:var(--tx)}

/* ── LANDING ── */
#landing{
  height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0;background:var(--bg);position:relative;overflow:hidden;
}
.land-clover-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden}

/* ── APP ── */
#app{height:100vh;display:none;flex-direction:column;background:var(--bg)}
.topnav{
  display:flex;align-items:center;padding:0 20px;
  border-bottom:1px solid var(--bd);background:var(--sf);
  flex-shrink:0;height:50px;gap:0;
}
.tn-logo{
  font-family:'Noto Serif KR',Georgia,serif;font-weight:300;font-style:italic;
  font-size:18px;color:var(--mu2);margin-right:20px;letter-spacing:1px;flex-shrink:0;
}
.tn-tabs{display:flex;flex:1}
.tn-tab{
  padding:0 14px;height:50px;line-height:50px;font-size:11px;font-weight:600;
  color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;
  transition:all .15s;white-space:nowrap;letter-spacing:.3px;
}
.tn-tab:hover{color:var(--tx)}
.tn-tab.on{color:var(--Rd);border-bottom-color:var(--R)}
.tn-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tn-back{
  background:none;border:1px solid var(--bd);color:var(--mu);
  padding:5px 12px;border-radius:20px;cursor:pointer;font-size:11px;
  transition:all .2s;
}
.tn-back:hover{border-color:var(--R);color:var(--Rd)}
.tn-mode{font-size:10px;color:var(--mu);opacity:.7}

.page{flex:1;overflow:hidden;display:none}
.page.on{display:flex;flex-direction:column}

/* ── CAL LAYOUT ── */
.cal-layout{display:flex;flex:1;overflow:hidden;position:relative}
.cal-sb{
  width:190px;flex-shrink:0;background:var(--sf);
  border-right:1px solid var(--bd);overflow-y:auto;padding:14px 0;
  transition:width .25s,opacity .25s;
}
.cal-sb.collapsed{width:0;overflow:hidden;padding:0;opacity:0}
.sb-toggle{
  position:absolute;left:0;top:50%;transform:translateY(-50%);
  z-index:10;width:18px;height:44px;
  background:var(--sf);border:1px solid var(--bd);border-left:none;
  border-radius:0 6px 6px 0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--mu);font-size:10px;transition:left .25s,background .15s;
}
.sb-toggle:hover{background:var(--sf2);color:var(--Rd)}
.cal-body{flex:1;display:flex;flex-direction:column;overflow:hidden}
.cal-top{
  padding:10px 16px;display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--bd);background:var(--sf);flex-shrink:0;
}
.nb{
  background:var(--sf2);border:1px solid var(--bd);color:var(--tx);
  padding:4px 9px;border-radius:20px;cursor:pointer;font-size:11px;transition:border-color .15s;
}
.nb:hover{border-color:var(--R)}
.ml{font-size:13px;font-weight:600;min-width:110px;color:var(--tx)}
.vt{display:flex;gap:2px;background:var(--sf2);border-radius:20px;padding:2px;margin-left:auto}
.vb{
  padding:4px 10px;border-radius:18px;border:none;background:none;
  color:var(--mu);cursor:pointer;font-size:11px;font-weight:600;transition:all .15s;
}
.vb.on{background:var(--R);color:#fff}
.add-b{
  border:none;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;
  cursor:pointer;background:var(--R);color:#fff;margin-left:4px;transition:background .15s;
}
.add-b:hover{background:var(--Rd)}

/* sidebar */
.mini-wrap{padding:12px}
.mini-hd{font-size:10px;color:var(--mu);font-weight:600;margin-bottom:7px;letter-spacing:.3px}
.mini-g{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.md{text-align:center;font-size:9px;padding:3px 1px;color:var(--mu);cursor:pointer;border-radius:2px}
.md.hd{font-weight:700;cursor:default}
.md.td{background:var(--R);color:#fff;border-radius:50%;font-weight:800}
.md.he{color:var(--tx);font-weight:600}
.sb-sect{font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--mu);padding:10px 12px 5px;font-weight:700}
.sb-item{display:flex;align-items:center;gap:7px;padding:4px 12px;font-size:11px;cursor:pointer}
.sb-item input{width:12px;height:12px;cursor:pointer;accent-color:var(--R)}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-item span{color:var(--mu2);font-size:11px}
.legend{padding:10px 12px;border-top:1px solid var(--bd);margin-top:6px}
.leg-i{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--mu2);margin-bottom:5px}
.leg-d{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* MONTH */
.mg-wrap{flex:1;overflow:hidden;padding:10px;display:flex;flex-direction:column;gap:5px}
.mg-hdr{display:grid;grid-template-columns:repeat(7,1fr)}
.dl{text-align:center;font-size:9px;color:var(--mu);font-weight:700;padding:3px 0;letter-spacing:.5px}
.mg{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr;gap:1px;background:var(--bd);border:1px solid var(--bd);border-radius:8px;overflow:hidden;flex:1}
.mc{background:var(--sf);padding:4px;overflow:hidden;cursor:pointer;min-height:80px;display:flex;flex-direction:column;gap:1px}
.mc:hover{background:var(--sf2)}
.mc.dim{opacity:.35;background:var(--bg2)}
.mc.tdc{background:var(--Rl)}
.dn{font-size:9px;color:var(--mu);font-weight:600;margin-bottom:2px;flex-shrink:0}
.tdc .dn{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;background:var(--R);color:#fff;font-size:8px;font-weight:800}
.m-bar{font-size:8px;padding:2px 5px;border-radius:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;margin-bottom:2px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;gap:3px}
.m-bar-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.more-m{font-size:8px;color:var(--mu);padding:1px 4px}
.avail-slot{font-size:8px;padding:2px 5px;border-radius:10px;font-weight:600;margin-bottom:2px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff}

/* TIME GRID */
.tg-wrap{flex:1;overflow:auto;padding:10px;position:relative}
.tg-inner{position:relative}
.tg-grid{display:grid;background:var(--bd);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.tg-corner{background:var(--sf2)}
.tg-dh{background:var(--sf2);padding:8px 5px;text-align:center}
.tg-dh .wd{font-size:9px;color:var(--mu);font-weight:700}
.tg-dh .wn{font-size:14px;font-weight:700}
.tg-dh.td .wn{background:var(--R);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;margin:0 auto}
.tg-tl{background:var(--sf);padding:3px 6px;font-size:9px;color:var(--mu);text-align:right;border-right:1px solid var(--bd);display:flex;align-items:flex-start;justify-content:flex-end;padding-top:4px}
.tg-cell{background:var(--sf);border-left:1px solid var(--bd);cursor:pointer}
.tg-cell:hover{background:var(--sf2)}
.t-block{position:absolute;border-radius:6px;padding:4px 7px;font-size:9px;font-weight:600;overflow:hidden;cursor:pointer;transition:filter .15s;z-index:1;color:#fff}
.t-block:hover{filter:brightness(.95)}
.tb-lbl{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-time{font-size:8px;opacity:.8;margin-top:1px}

/* PANEL */
.ov{position:fixed;inset:0;background:rgba(30,40,30,.35);z-index:300;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.pn{background:var(--sf);border:1px solid var(--bd);border-radius:14px;width:440px;max-height:88vh;overflow-y:auto;padding:26px;box-shadow:0 8px 40px rgba(0,0,0,.08)}
.pn-h{font-size:14px;font-weight:600;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.px{background:none;border:none;color:var(--mu);font-size:20px;cursor:pointer;opacity:.6;transition:opacity .15s}
.px:hover{opacity:1}
.fg{margin-bottom:12px}
.fg label{font-size:9px;color:var(--mu);display:block;margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select,.fg textarea{width:100%;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);padding:9px 11px;border-radius:var(--r);font-size:12px;outline:none;font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--R);background:var(--sf)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sub-btn{width:100%;padding:11px;border:none;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;background:var(--R);color:#fff;margin-top:4px;transition:background .15s}
.sub-btn:hover{background:var(--Rd)}
.sub-btn:disabled{opacity:.5;cursor:not-allowed}
.label-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:4px}
.label-chip{border-radius:20px;padding:5px 6px;cursor:pointer;font-size:9px;font-weight:700;text-align:center;color:#fff;transition:opacity .15s;border:2px solid transparent;opacity:.6}
.label-chip:hover{opacity:.85}
.label-chip.sel{border-color:rgba(0,0,0,.25);opacity:1}
.badge{padding:2px 9px;border-radius:20px;font-size:9px;font-weight:700;display:inline-block}
.bOK{background:rgba(106,184,122,.15);color:var(--ok)}
.bWAIT{background:rgba(200,164,86,.15);color:var(--wait)}
.det-r{display:flex;gap:8px;font-size:12px;margin-bottom:9px;align-items:flex-start}
.det-l{color:var(--mu2);font-size:10px;min-width:60px;flex-shrink:0;margin-top:1px}
.act-row{display:flex;gap:8px;margin-top:14px}
.btn-ok{background:var(--ok);color:#fff;border:none;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer}
.btn-ng{background:transparent;color:var(--ng);border:1px solid var(--ng);padding:8px 18px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer}
.btn-del{width:100%;background:none;border:1px solid var(--bd);color:var(--ng);padding:7px;border-radius:20px;cursor:pointer;font-size:11px;margin-top:8px}
.client-view-box{margin-top:12px;padding:10px 12px;background:var(--sf2);border-radius:var(--r);border-left:2px solid var(--R)}
.cv-label{font-size:9px;color:var(--mu);font-weight:700;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.cv-val{font-size:11px;color:var(--Rd)}

/* REQ */
.rq-wrap{flex:1;overflow-y:auto;padding:18px}
.rcard{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:10px}
.rn{font-size:13px;font-weight:700}
.rm{font-size:10px;color:var(--mu2);margin-top:3px;line-height:1.6}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:13px}
.sn{font-size:22px;font-weight:800;color:var(--R)}
.sl{font-size:10px;color:var(--mu2);margin-top:2px}
.sect-label{font-size:9px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}

/* IMPORT */
.import-wrap{flex:1;overflow-y:auto;padding:18px}
.import-box{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:20px;margin-bottom:16px}
.import-box h3{font-size:13px;font-weight:700;margin-bottom:8px;color:var(--Rd)}
.import-box p{font-size:11px;color:var(--mu2);line-height:1.7;margin-bottom:12px}
.import-box textarea{width:100%;height:140px;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);padding:10px;border-radius:var(--r);font-size:11px;font-family:monospace;outline:none;resize:vertical}
.import-box textarea:focus{border-color:var(--R)}
.import-result{margin-top:10px;font-size:11px;padding:8px 12px;border-radius:var(--r);display:none}
.import-result.ok{background:rgba(106,184,122,.12);color:var(--ok);display:block}
.import-result.err{background:rgba(200,96,96,.08);color:var(--ng);display:block}

/* STORAGE INFO */
.storage-bar{padding:10px 12px;border-top:1px solid var(--bd);margin-top:8px}
.storage-info{font-size:10px;color:var(--mu2);line-height:1.8}
.storage-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--R);margin-right:4px;vertical-align:middle}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--sf);border:1px solid var(--bd);color:var(--Rd);padding:10px 22px;border-radius:30px;font-size:11px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.toast.on{opacity:1}
option{background:#fff}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* ADMIN LOGIN */
.login-wrap{display:flex;gap:8px;margin-bottom:12px}
.login-btn{flex:1;padding:11px;border:1px solid var(--bd);border-radius:var(--r);background:var(--sf2);cursor:pointer;font-size:11px;font-weight:600;color:var(--mu2);transition:all .2s;text-align:center}
.login-btn:hover,.login-btn.sel{border-color:var(--R);color:var(--Rd);background:var(--Rl)}
</style>
</head>

<!-- LANDING -->
<div id="landing">
  <div class="land-clover-wrap">
    <svg width="340" height="340" style="position:absolute;top:-60px;right:-60px;opacity:.055" viewBox="0 0 200 200">
      <g transform="translate(100,110)" fill="none" stroke="#5a9a5a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M0,-2 C-8,-20 -38,-45 -42,-28 C-46,-10 -20,2 0,-2Z"/>

        <path d="M0,-2 C20,-8 48,-32 36,-44 C24,-56 4,-26 0,-2Z"/>
        <path d="M0,-2 C14,-6 38,-26 30,-38" stroke-width="1.2" opacity=".5"/>
        <path d="M0,-2 C10,18 4,52 -14,48 C-32,44 -14,16 0,-2Z"/>
        <path d="M0,-2 C6,12 4,38 -8,38" stroke-width="1.2" opacity=".5"/>

      </g>
    </svg>
    <svg width="260" height="260" style="position:absolute;bottom:-50px;left:-40px;opacity:.045" viewBox="0 0 200 200">
      <g transform="translate(100,100)" fill="none" stroke="#7ab87a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">

      <g transform="translate(100,110)" fill="none" stroke="#5a9a5a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M0,-2 C-6,-18 -32,-38 -36,-22 C-40,-6 -16,4 0,-2Z"/>
        <path d="M0,-2 C18,-6 40,-28 28,-40 C16,-52 2,-22 0,-2Z"/>

        <path d="M0,0 C2,10 5,24 10,36" stroke-width="2.5"/>
      </g>
    </svg>
    <svg width="90" height="90" style="position:absolute;top:55%;right:8%;opacity:.04" viewBox="0 0 200 200">
      <g transform="translate(100,100)" fill="none" stroke="#7ab87a" stroke-width="4.5" stroke-linecap="round">
        <path d="M0,0 C-4,-14 -20,-30 -28,-18 C-36,-6 -14,4 0,0Z"/>
        <path d="M0,0 C14,-4 30,-20 18,-28 C6,-36 -4,-14 0,0Z"/>
        <path d="M0,0 C4,14 20,30 28,18 C36,6 14,-4 0,0Z"/>
        <path d="M0,0 C-14,4 -30,20 -18,28 C-6,36 4,14 0,0Z"/>
      </g>
    </svg>
    <svg width="60" height="60" style="position:absolute;top:20%;right:22%;opacity:.06" viewBox="0 0 60 60">
      <circle cx="10" cy="30" r="3" fill="#7ab87a"/>
      <circle cx="30" cy="10" r="2" fill="#5a9a5a"/>
      <circle cx="50" cy="30" r="3" fill="#7ab87a"/>
      <circle cx="30" cy="50" r="2" fill="#5a9a5a"/>
    </svg>
  </div>

  <div style="text-align:center;position:relative;z-index:1;display:flex;flex-direction:column;align-items:center">
    <svg width="72" height="72" viewBox="0 0 120 120" style="margin-bottom:20px">
      <g transform="translate(60,68)" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M0,-4 C-8,-24 -44,-54 -48,-32 C-52,-10 -20,2 0,-4Z" stroke="#7ab87a" stroke-width="3.5" fill="rgba(122,184,122,.12)"/>
        <path d="M0,-4 C22,-10 56,-40 42,-54 C28,-68 4,-28 0,-4Z" stroke="#7ab87a" stroke-width="3.5" fill="rgba(122,184,122,.12)"/>
        <path d="M0,-4 C12,22 4,62 -18,56 C-40,50 -16,18 0,-4Z" stroke="#7ab87a" stroke-width="3.5" fill="rgba(122,184,122,.12)"/>
        <path d="M0,-4 C-5,-16 -28,-36 -36,-24" stroke="#5a9a5a" stroke-width="1.2" opacity=".5"/>
        <path d="M0,-4 C12,-8 32,-26 28,-38" stroke="#5a9a5a" stroke-width="1.2" opacity=".5"/>
        <path d="M0,-4 C6,12 4,40 -8,34" stroke="#5a9a5a" stroke-width="1.2" opacity=".5"/>
        <g transform="translate(32,-32) rotate(20) scale(.55)">
          <path d="M0,0 C-3,-12 -18,-26 -24,-14 C-30,-2 -12,4 0,0Z" stroke="#5a9a5a" stroke-width="3" fill="rgba(90,154,90,.15)"/>
          <path d="M0,0 C12,-3 26,-18 14,-24 C2,-30 -4,-12 0,0Z" stroke="#5a9a5a" stroke-width="3" fill="rgba(90,154,90,.15)"/>
          <path d="M0,0 C3,12 18,26 24,14 C30,2 12,-4 0,0Z" stroke="#5a9a5a" stroke-width="3" fill="rgba(90,154,90,.15)"/>
          <path d="M0,0 C-12,3 -26,18 -14,24 C-2,30 4,12 0,0Z" stroke="#5a9a5a" stroke-width="3" fill="rgba(90,154,90,.15)"/>
        </g>
        <path d="M0,-2 C3,16 8,36 14,54" stroke="#5a9a5a" stroke-width="3"/>
      </g>
    </svg>
    <div style="font-size:40px;font-weight:300;color:#3a5a3a;letter-spacing:2px;font-family:Georgia,serif;font-style:italic;line-height:1;margin-bottom:10px">maydly</div>
    <div style="font-size:12px;color:#8aaa8a;letter-spacing:.5px;line-height:1.8;margin-bottom:8px">나를 이해하고 기록하는 촬영</div>
    <div style="font-size:10px;color:#b04040;font-weight:600;margin-bottom:16px;padding:5px 14px;border:1px solid #e0c0c0;border-radius:20px;background:#fff8f8">관리자 전용</div>

    <div style="
      background:#fff3cd;border:1px solid #ffc107;border-radius:10px;
      padding:12px 18px;margin-bottom:28px;max-width:320px;text-align:left;
      font-size:11px;line-height:1.7;color:#7a5800;
    ">
      <div style="font-weight:700;margin-bottom:4px;font-size:12px;">⚠️ 보안 주의사항</div>
      이 파일(<code style="background:rgba(0,0,0,.08);padding:1px 4px;border-radius:3px">admin.html</code>)은 <strong>공개 URL에 절대 업로드하지 마세요.</strong><br>

<script>
// ── 유틸 (최상단 정의, UTC 버그 방지) ──
function fd(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return`${y}-${m}-${dd}`;}
function parseDS(ds){const[y,m,d]=ds.split('-').map(Number);return new Date(y,m-1,d);}
function dowOf(ds){return parseDS(ds).getDay();} // 0=일,1=월,...,6=토
function pad(n){return String(n).padStart(2,'0');}
function mkd(n){const d=new Date(TODAY);d.setDate(TODAY.getDate()+n);return fd(d);}
function addH(t,h){const[hh,mm]=t.split(':').map(Number);const tot=hh*60+mm+h*60;return`${pad(Math.floor(tot/60)%24)}:${pad(tot%60)}`;}
function addDays(ds,n){const d=new Date(ds);d.setDate(d.getDate()+n);return fd(d);}

// ── 상수 ──
const TODAY=new Date(), TSTR=fd(TODAY);
const STORAGE_KEY='maydly_events_v2';
const STORAGE_REQ_KEY='maydly_requests_v2';
const STORAGE_GCAL_KEY='maydly_gcal_admin_v1';

// ── 구글 캘린더 설정 ──
const GCAL_MINJIN_KEYWORDS=['명진'];
const GCAL_CAL_IDS=[
  'dcba34499541fc3f1eed2a55fc82633f0bdc28ca369d81dda4785e7e830bdb45@group.calendar.google.com',
  '9fcd35edcb1b4b433445d0bb1e2d0c5cbb312ca9f87830d0e9b9b2321030b54e@group.calendar.google.com',
];

// gcalEvents: [{date:'2026-05-15', allDay:true}, ...]
let gcalEvents=[];
function loadGcalCache(){
  try{const raw=sessionStorage.getItem(STORAGE_GCAL_KEY);if(raw){const d=JSON.parse(raw);gcalEvents=d.events||[];}}catch(e){}
}
function saveGcalCache(events){
  gcalEvents=events;
  try{sessionStorage.setItem(STORAGE_GCAL_KEY,JSON.stringify({events,at:Date.now()}));}catch(e){}
}

function nowStr(){return new Date().toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});}

// ── 라벨 (TimeTree 라벨 목록 기준) ──
// cat null → studio_m (남스튜디오)

  studio_pay:{name:'스튜디오페이',color:'#e8a0b0'},

  pa_shoot:{name:'PA촬영',color:'#7050c0'},
  rest:{name:'휴무',color:'#c03030'},
  nopay:{name:'무페이',color:'#60a860'},

// ── 데이터 (SAMPLE_EVENTS는 빈 배열, 버전 tt_v4로 기존 캐시 초기화) ──
const DATA_VERSION='tt_v5';
const SAMPLE_EVENTS=[];

function loadEvents(){
  try{
    const ver=localStorage.getItem('maydly_data_ver');
    if(ver===DATA_VERSION){
      const raw=localStorage.getItem(STORAGE_KEY);
      if(raw){const d=JSON.parse(raw);if(Array.isArray(d))return d;}
    }
    // 버전 불일치 → 기존 데이터 전부 지우고 초기화
    localStorage.clear();
    const fresh=JSON.parse(JSON.stringify(SAMPLE_EVENTS));
    localStorage.setItem(STORAGE_KEY,JSON.stringify(fresh));
    localStorage.setItem('maydly_data_ver',DATA_VERSION);
    return fresh;
  }catch(e){}
  return[];
}
function saveEvents(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(maydlyEvents));lastSaved=nowStr();}
  catch(e){toast('저장 실패');}
}
function loadRequests(){
  try{const raw=localStorage.getItem(STORAGE_REQ_KEY);if(raw)return JSON.parse(raw);}catch(e){}
  return[];
}
function saveRequests(){

}

// 비밀번호 해시 (SHA-256). 평문 비밀번호는 코드에 없음.
// 아래 해시값은 '수빈0232' 의 SHA-256 결과입니다.
// 비밀번호 변경 시: https://emn178.github.io/online-tools/sha256.html 에서 새 해시 생성 후 교체
const PW_HASH='5758f9ae2c9d7a7d08a7ac68af73f7b301cd0f8857ca1c7752b8cd153e040d20';
async function hashPw(pw){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function doLogin(){
  const pw=document.getElementById('adminPw').value;
  const h=await hashPw(pw);
  if(h===PW_HASH){localStorage.setItem('maydly_session','1');closeP();enter();}
  else{document.getElementById('login-err').style.display='block';}
}

// ── 구글 캘린더 동기화 (Cowork MCP 경유) ──
async function syncAndExport(btn){
  const orig=btn?btn.innerHTML:'';
  if(btn){btn.innerHTML='⏳ 동기화 중...';btn.disabled=true;}
  try{
    await syncGcal();
    const statusEl=document.getElementById('gcalStatus');
    if(statusEl)statusEl.textContent=gcalEvents.length>0?`✓ ${gcalEvents.length}개 연동됨`:'동기화 완료';
    exportPublicData();
    toast('✓ 동기화 완료 — public-data.json 다운로드됨');
  }catch(e){
    toast('동기화 실패: '+e.message);
  }finally{
    if(btn){btn.innerHTML=orig;btn.disabled=false;}
  }
}

async function syncGcal(){
  try{
    const today=new Date();
    const start=new Date(today.getFullYear(),today.getMonth()-1,1).toISOString();
    const end=new Date(today.getFullYear(),today.getMonth()+3,1).toISOString();

    if(!window.cowork||!window.cowork.callMcpTool)return;

    const results=await Promise.all(GCAL_CAL_IDS.map(calendarId=>
      window.cowork.callMcpTool(
        'mcp__0353f32c-2f0c-48a3-9788-097afa406bc9__list_events',
        {calendarId,startTime:start,endTime:end,pageSize:200}
      )
    ));
    const events=results.flatMap(r=>(r&&r.events)||[]);
    const parsed=[];
    events.forEach(ev=>{
      const sum=ev.summary||'';
      if(!GCAL_MINJIN_KEYWORDS.some(k=>sum.includes(k)))return;
      if(ev.start&&ev.start.date){
        parsed.push({allDay:true,date:ev.start.date});
      }else if(ev.start&&ev.start.dateTime){
        const d=ev.start.dateTime.slice(0,10);
        const st=ev.start.dateTime.slice(11,16);
        const et=ev.end.dateTime.slice(11,16);
        parsed.push({allDay:false,date:d,time:st,endTime:et});
      }
    });
    saveGcalCache(parsed);
    if(curPage==='cal')renderBody();
  }catch(e){console.log('gcal sync skip',e);}
}

function enter(){

        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        동기화 + 공개 데이터 내보내기

function renderMini(){

function getVis(){
  return maydlyEvents.filter(e=>filters[e.label]!==false);
}
function renderBody(){calView==='month'?renderMonth():renderTimeGrid();}

function renderMonth(){
  const y=curDate.getFullYear(),m=curDate.getMonth();
  const first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),prev=new Date(y,m,0).getDate();
  let h=`<div class="mg-wrap"><div class="mg-hdr">`;
  ['일','월','화','수','목','금','토'].forEach(d=>h+=`<div class="dl">${d}</div>`);
  h+=`</div><div class="mg">`;
  for(let i=0;i<first;i++)h+=mCell(fd(new Date(y,m-1,prev-first+1+i)),prev-first+1+i,true);
  for(let d=1;d<=days;d++)h+=mCell(fd(new Date(y,m,d)),d,false);
  const rem=(7-(first+days)%7)%7;
  for(let d=1;d<=rem;d++)h+=mCell(fd(new Date(y,m+1,d)),d,true);
  h+=`</div></div>`;
  document.getElementById('calBody').innerHTML=h;
}
function mCell(ds,dn,dim){
  const isT=ds===TSTR;
  let inner='';
  // 해당 날짜에 표시할 이벤트: date===ds 이거나, 다일촬영(dur>=24h)이 ds를 포함하는 경우
  const allVis=getVis();
  const evs=allVis.filter(e=>{
    if(e.date===ds)return true;
    if(e.dur>=24){
      // dur=시간 단위, 일 단위로 변환
      const days=Math.ceil(e.dur/24);
      const start=new Date(e.date);
      for(let i=1;i<days;i++){
        const nd=new Date(start);nd.setDate(start.getDate()+i);
        if(fd(nd)===ds)return true;
      }
    }
    return false;
  }).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const MAX=3;
  evs.slice(0,MAX).forEach(e=>{
    const L=LABELS[e.label]||{name:'기타',color:'#999'};
    const isNosh=e.status==='nosh';
    const isPend=e.status==='pending';
    const isCancel=e.status==='cancel';
    const isSpan=e.date!==ds;
    let op='';
    if(isNosh)op='opacity:.4;text-decoration:line-through;';
    else if(isPend)op='opacity:.65;';
    else if(isCancel)op='opacity:.35;text-decoration:line-through;';
    const badge=isNosh?'<span style="font-size:7px;background:#c86060;color:#fff;border-radius:4px;padding:0 3px;margin-left:2px">노쇼</span>':'';
    inner+=`<div class="m-bar" style="background:${L.color}18;${op}" onclick="event.stopPropagation();openD(${e.id})">
      <span class="m-bar-dot" style="background:${L.color}${isNosh||isCancel?';opacity:.4':''}"></span>
      <span style="color:var(--tx);flex:1;overflow:hidden;text-overflow:ellipsis">${e.time&&!isSpan?e.time.slice(0,5)+' ':''}${e.client||L.name}${badge}</span>
    </div>`;
  });
  if(evs.length>MAX)inner+=`<div class="more-m" onclick="event.stopPropagation();openDay('${ds}')">+${evs.length-MAX}개 더보기 →</div>`;
  return`<div class="mc${dim?' dim':''}${isT?' tdc':''}" onclick="openDay('${ds}')"><div class="dn">${dn}</div>${inner}</div>`;
}

function renderTimeGrid(){
  const isDay=calView==='day',cols=isDay?1:7;
  const days=['일','월','화','수','목','금','토'];
  let ws=new Date(curDate);
  if(!isDay)ws.setDate(curDate.getDate()-curDate.getDay());
  let h=`<div class="tg-wrap"><div class="tg-inner"><div class="tg-grid" style="grid-template-columns:44px repeat(${cols},1fr)">
    <div class="tg-corner" style="height:38px"></div>
    ${Array.from({length:cols},(_,i)=>{const d=new Date(ws);d.setDate(ws.getDate()+i);const isT=fd(d)===TSTR;return`<div class="tg-dh${isT?' td':''}">
      ${!isDay?`<div class="wd">${days[d.getDay()]}</div>`:''}
      <div class="wn">${d.getDate()}</div></div>`;}).join('')}
    ${Array.from({length:HE-HS},(_,r)=>{const hr=HS+r;return`<div class="tg-tl" style="height:${PX}px">${hr}:00</div>`+Array.from({length:cols},(_,i)=>{const d=new Date(ws);d.setDate(ws.getDate()+i);return`<div class="tg-cell" style="height:${PX}px" onclick="openDay('${fd(d)}')"></div>`;}).join('');}).join('')}
  </div></div></div>`;
  document.getElementById('calBody').innerHTML=h;
  requestAnimationFrame(()=>placeBlocks(ws,cols));
}
function placeBlocks(ws,cols){
  const wrap=document.querySelector('.tg-inner');if(!wrap)return;
  const grid=wrap.querySelector('.tg-grid');
  const timeW=44,headerH=38;
  const colW=(grid.getBoundingClientRect().width-timeW)/cols;
  const vis=getVis();
  for(let i=0;i<cols;i++){
    const d=new Date(ws);d.setDate(ws.getDate()+i);
    const ds=fd(d);
    vis.filter(e=>e.date===ds&&e.time).forEach(e=>{
      const[hh,mm]=e.time.split(':').map(Number);if(hh<HS||hh>=HE)return;
      const L=LABELS[e.label]||{name:'기타',color:'#999'};
      const top=headerH+(hh-HS)*PX+(mm/60)*PX,height=e.dur*PX-2;
      const op=e.status==='pending'?'opacity:.7;':'';
      const el=document.createElement('div');
      el.className='t-block';
      el.style.cssText=`top:${top}px;left:${timeW+i*colW+2}px;width:${colW-4}px;height:${height}px;background:${L.color};pointer-events:auto;${op}`;
      el.innerHTML=`<div class="tb-lbl">${e.client||L.name}</div>${height>28?`<div class="tb-time">${e.time} – ${addH(e.time,e.dur)}</div>`:''}`;
      el.onclick=ev=>{ev.stopPropagation();openD(e.id);};
      wrap.appendChild(el);
    });
  }
}

function openDay(ds){
  // 그날 시작하는 이벤트만 표시 (장기일정=다일 촬영도 시작일 기준)
  const evs=getVis().filter(e=>e.date===ds)
    .sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  if(evs.length===0){openAdd(ds);return;}
  // 날짜 패널: 전체 이벤트 목록 표시
  const [y,m,d]=ds.split('-');
  document.getElementById('pnh').innerHTML=`${y}년 ${parseInt(m)}월 ${parseInt(d)}일<button class="px" onclick="closeP()">×</button>`;
  let b='';
  evs.forEach(e=>{
    const L=LABELS[e.label]||{name:'기타',color:'#999'};
    const isNosh=e.status==='nosh',isCancel=e.status==='cancel',isPend=e.status==='pending';
    const stMap={confirmed:'',pending:'<span style="font-size:8px;background:var(--wait);color:#fff;border-radius:4px;padding:0 4px;margin-left:4px">대기</span>',nosh:'<span style="font-size:8px;background:#c86060;color:#fff;border-radius:4px;padding:0 4px;margin-left:4px">노쇼</span>',cancel:'<span style="font-size:8px;background:#aaa;color:#fff;border-radius:4px;padding:0 4px;margin-left:4px">취소</span>'};
    const stBadge=stMap[e.status]||'';
    let op=isNosh||isCancel?'opacity:.5;text-decoration:line-through;':isPend?'opacity:.75;':'';
    b+=`<div style="display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;margin-bottom:4px;background:${L.color}12;cursor:pointer;${op}" onclick="closeP();openD(${e.id})">
      <div style="width:8px;height:8px;border-radius:50%;background:${L.color};flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;font-weight:700;color:var(--tx)">${e.client||L.name}${stBadge}</div>
        <div style="font-size:9px;color:var(--mu);margin-top:1px">${e.time?e.time.slice(0,5)+' – '+addH(e.time,e.dur)+' ('+e.dur+'h)':L.name}</div>
      </div>
    </div>`;
  });
  b+=`<button class="sub-btn" style="margin-top:8px;width:100%" onclick="closeP();openAdd('${ds}')">+ 이 날 일정 추가</button>`;
  document.getElementById('pb').innerHTML=b;
  openP();
}

function openD(id){
  const e=maydlyEvents.find(x=>x.id===id);if(!e)return;
  const L=LABELS[e.label]||{name:'기타',color:'#999'};
  document.getElementById('pnh').innerHTML=`${e.client||L.name}<button class="px" onclick="closeP()">×</button>`;
  const stbMap={confirmed:'<span class="badge bOK">확정</span>',pending:'<span class="badge bWAIT">대기</span>',nosh:'<span class="badge" style="background:#c86060;color:#fff">노쇼</span>',cancel:'<span class="badge" style="background:#aaa;color:#fff">취소</span>'};
  const stb=stbMap[e.status]||stbMap.confirmed;
  let b=`<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center">${stb}<span style="background:${L.color};color:#fff;font-size:9px;font-weight:700;padding:2px 9px;border-radius:20px">${L.name}</span></div>`;
  const durDays=Math.ceil(e.dur/24);
  b+=`<div class="det-r"><span class="det-l">📅 날짜</span>${e.date}${durDays>1?` ~ ${addDays(e.date,durDays-1)} (${durDays}일)`:''}</div>`;
  if(e.time)b+=`<div class="det-r"><span class="det-l">🕐 시간</span>${e.time} – ${addH(e.time,Math.min(e.dur,12))} (${e.dur}시간)</div>`;
  if(e.client)b+=`<div class="det-r"><span class="det-l">👤 고객</span>${e.client}</div>`;
  if(e.phone)b+=`<div class="det-r"><span class="det-l">📞 연락처</span>${e.phone}</div>`;
  if(e.note)b+=`<div class="det-r"><span class="det-l">📝 메모</span>${e.note}</div>`;
  if(!e.priv&&e.status==='confirmed'){
    const slots=getMaydlySlots(e.date,maydlyEvents.filter(x=>x.date===e.date&&x.status==='confirmed'));
    const cv=slots.length===1&&slots[0].allDayBlock?'종일 외부 촬영 일정으로 인한 예약 불가':`예약 불가 (${e.time}~${addH(e.time,e.dur)})`;
    b+=`<div class="client-view-box"><div class="cv-label">고객에게 표시</div><div class="cv-val">${cv}</div></div>`;
  }
  if(e.status==='pending')b+=`<div class="act-row"><button class="btn-ok" onclick="confEv(${e.id});closeP()">✓ 확정</button><button class="btn-ng" onclick="rejEv(${e.id});closeP()">✕ 거절</button></div>`;
  if(e.status==='confirmed'||e.status==='pending')b+=`<div class="act-row" style="margin-top:4px"><button class="btn-ng" style="flex:1" onclick="setStatus(${e.id},'nosh');closeP()">노쇼 처리</button><button class="btn-ng" style="flex:1;background:var(--bd);color:var(--mu)" onclick="setStatus(${e.id},'cancel');closeP()">취소</button></div>`;
  b+=`<button class="btn-del" onclick="delEv(${e.id})">삭제</button>`;
  document.getElementById('pb').innerHTML=b;openP();
}

// ── getMaydlySlots (관리자용 — busyEvs 포함) ──
function gcalAllDay(ds){return gcalEvents.some(e=>e.allDay&&e.date===ds);}
function gcalTimeBusy(ds){
  return gcalEvents.filter(e=>!e.allDay&&e.date===ds).map(e=>{
    const[sh,sm]=e.time.split(':').map(Number);
    const[eh,em]=e.endTime.split(':').map(Number);
    return{s:sh+sm/60,e:eh+em/60};
  });
}
function getMaydlySlots(ds,busyEvs){
  const dow=dowOf(ds); // 0=일,1=월,2=화,3=수,4=목,5=금,6=토

  // 월(1),화(2),금(5),토(6) → 종일 외부 촬영 일정으로 인한 예약 불가
  if(dow===1||dow===2||dow===5||dow===6){
    return[{avail:false,allDayBlock:true,label:'종일 외부 촬영 일정으로 인한 예약 불가',s:9,e:21}];
  }
  // gcal 종일 차단
  if(gcalAllDay(ds)){
    return[{avail:false,allDayBlock:true,label:'종일 외부 촬영 일정으로 인한 예약 불가',s:9,e:21}];
  }
  // maydly 내부 휴무(rest) 종일 이면 종일 불가
  const hasRestDay=busyEvs.some(e=>e.label==='rest'&&e.dur>=8);
  if(hasRestDay){
    return[{avail:false,allDayBlock:true,label:'종일 외부 촬영 일정으로 인한 예약 불가',s:9,e:21}];
  }
  // outdoor_c/pa_shoot 등 종일 상업촬영(dur>=8)이면 종일 불가
  const hasFullShoot=busyEvs.some(e=>['outdoor_c','pa_shoot'].includes(e.label)&&e.dur>=8);
  if(hasFullShoot){
    return[{avail:false,allDayBlock:true,label:'종일 외부 촬영 일정으로 인한 예약 불가',s:9,e:21}];
  }

  // 일(0) → 4타임, 수(3)/목(4) → 3타임
  const isWeekend=(dow===0);
  const timeSlots=isWeekend
    ?[[11,13],[14,16],[17,19],[20,22]]
    :[[14,16],[17,19],[20,22]];

  const busy=busyEvs.filter(e=>e.time).map(e=>{
    const[hh,mm]=e.time.split(':').map(Number);
    return{s:hh+mm/60,e:hh+mm/60+e.dur};
  });
  const gcalBusy=gcalTimeBusy(ds);
  const allBusy=[...busy,...gcalBusy];

  function isOverlap(s,e){return allBusy.some(r=>!(e<=r.s||s>=r.e));}

  return timeSlots.map(([s,e])=>{
    const avail=!isOverlap(s,e);
    return{avail,allDayBlock:false,label:`${pad(s)}:00~${pad(e)}:00 ${avail?'가능':'불가'}`,s,e};
  });
}

      <h3 style="color:var(--ng)">⚠️ 전체 초기화</h3>
      <p>모든 일정을 삭제하고 새로 시작합니다. 되돌릴 수 없습니다.</p>
      <button class="sub-btn" style="background:var(--ng)" onclick="clearAll()">전체 삭제 후 초기화</button>
    </div>
  </div>`;
}

function parseDate(s){
  s=s.trim();const y=TODAY.getFullYear();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  if(/^\d{1,2}\/\d{1,2}$/.test(s)){const[m,d]=s.split('/');return`${y}-${pad(parseInt(m))}-${pad(parseInt(d))}`;}
  if(/^\d{1,2}-\d{1,2}$/.test(s)){const[m,d]=s.split('-');return`${y}-${pad(parseInt(m))}-${pad(parseInt(d))}`;}
  return null;
}
function parseTime(s){if(/^\d{1,2}:\d{2}$/.test(s)){const[h,m]=s.split(':');return`${pad(parseInt(h))}:${m}`;}return null;}
function parseLabel(s){
  const map={'여스튜디오':'studio_f','여':'studio_f','남스튜디오':'studio_m','남':'studio_m','야외':'outdoor','야외상업':'outdoor_c','상업':'outdoor_c','프로필':'profile','페이':'profile','pa':'pa_shoot','pa촬영':'pa_shoot','휴무':'rest','쉬는날':'rest','개인':'personal','스튜디오대관':'nosh','대관':'nosh'};
  return map[s.toLowerCase()]||null;
}
function parseDur(s){const m=s.match(/(\d+)(h|시간)?/i);return m?parseInt(m[1]):null;}

function doImport(){
  const txt=document.getElementById('import-text').value.trim();
  const res=document.getElementById('import-result');
  if(!txt){res.className='import-result err';res.textContent='텍스트를 입력해주세요.';return;}
  const lines=txt.split('\n').filter(l=>l.trim());
  let added=0,failed=[];
  lines.forEach(line=>{
    const parts=line.trim().split(/\s+/);
    let date=null,time=null,dur=2,label='studio_f',client='';
    parts.forEach(p=>{
      if(!date){const d=parseDate(p);if(d){date=d;return;}}
      if(!time){const t=parseTime(p);if(t){time=t;return;}}
      const d=parseDur(p);if(d&&d>0&&d<=12){dur=d;return;}
      const lb=parseLabel(p);if(lb){label=lb;return;}
      if(p.length>1&&!p.match(/^\d/)&&p!=='님')client+=(client?' ':'')+p.replace('님','');
    });
    if(!date){failed.push(line);return;}
    const isPriv=['rest','personal'].includes(label);
    maydlyEvents.push({id:nextId++,label,date,time:time||'10:00',dur,status:'confirmed',client:client||null,phone:null,note:'',priv:isPriv});
    added++;
  });
  saveEvents();
  if(added>0){
    res.className='import-result ok';
    res.textContent=`✓ ${added}개 일정이 추가되었습니다.${failed.length>0?` (${failed.length}개 실패)`:''} `;
  }else{
    res.className='import-result err';
    res.textContent='추가된 일정이 없습니다. 날짜 형식을 확인해주세요.';
  }
}

function doJsonImport(){
  const txt=document.getElementById('import-json').value.trim();
  const res=document.getElementById('import-json-result');
  try{
    const arr=JSON.parse(txt);
    if(!Array.isArray(arr))throw new Error('배열 형식이 아닙니다');
    let added=0;
    arr.forEach(e=>{
      if(!e.date||!e.label)return;
      maydlyEvents.push({id:nextId++,label:e.label||'studio_f',date:e.date,time:e.time||'10:00',dur:parseInt(e.dur)||2,status:e.status||'confirmed',client:e.client||null,phone:e.phone||null,note:e.note||'',priv:e.priv||['rest','personal'].includes(e.label)});
      added++;
    });
    saveEvents();res.className='import-result ok';res.textContent=`✓ ${added}개 일정이 추가되었습니다.`;
  }catch(e){res.className='import-result err';res.textContent=`JSON 오류: ${e.message}`;}
}

function exportPublicData(){
  // 내부 일정 → 고객 공개용 데이터 변환
  // 규칙: 고객명·브랜드명·메모 완전 제거, 날짜·시간·가능여부만 포함
  const confirmed=maydlyEvents.filter(e=>e.status==='confirmed');

  // 날짜별로 busy 시간대 집계
  const busyMap={};
  confirmed.forEach(e=>{
    if(!busyMap[e.date])busyMap[e.date]={allDay:false,slots:[]};
    // 종일 불가 조건
    if(['rest','outdoor_c','pa_shoot'].includes(e.label)&&e.dur>=8){
      busyMap[e.date].allDay=true;
    }else if(e.time){
      const[hh,mm]=e.time.split(':').map(Number);
      busyMap[e.date].slots.push({s:hh+mm/60,e:hh+mm/60+(e.dur||2)});
    }
  });

  // 앞으로 60일치 날짜 생성
  const days=[];
  for(let i=-7;i<90;i++){
    const d=new Date(TODAY);d.setDate(TODAY.getDate()+i);
    days.push(fd(d));
  }

  // 각 날짜별 공개 슬롯 계산
  const publicSlots={};
  days.forEach(ds=>{
    const dow=dowOf(ds);
    // 예약 불가 요일 (월1/화2/금5/토6)
    if([1,2,5,6].includes(dow)){publicSlots[ds]={unavailable:true};return;}

    const busy=busyMap[ds];
    if(busy?.allDay){publicSlots[ds]={unavailable:true};return;}

    const bSlots=busy?.slots||[];
    function isOverlap(s,e){return bSlots.some(r=>!(e<=r.s||s>=r.e));}

    const timeSlots=dow===0?[[11,13],[14,16],[17,19],[20,22]]:[[14,16],[17,19],[20,22]];
    const result=timeSlots.map(([s,e])=>({s:`${pad(s)}:00`,e:`${pad(e)}:00`,avail:!isOverlap(s,e)}));
    publicSlots[ds]={slots:result};
  });

  const output={
    generated:new Date().toISOString(),
    note:'고객 공개용 — 내부 정보 없음',
    schedule:publicSlots
  };

  const json=JSON.stringify(output,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='public-data.json';a.click();
  URL.revokeObjectURL(url);

  const res=document.getElementById('export-result');
  res.className='import-result ok';
  res.textContent=`✓ public-data.json 다운로드 완료. public.html과 같은 폴더에 저장하세요.`;
  toast('public-data.json 내보내기 완료');
}

function clearAll(){
  if(!confirm('정말 모든 일정을 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.'))return;
  if(!confirm('한 번 더 확인합니다. 전체 삭제하시겠습니까?'))return;
  maydlyEvents=[];nextId=1;saveEvents();toast('전체 삭제 완료');renderImport();
}

// ── 공통 ──
function openP(){document.getElementById('ov').style.display='flex';}
function closeP(){document.getElementById('ov').style.display='none';selLabel=null;}
function ovClick(e){if(e.target===document.getElementById('ov'))closeP();}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2800);}
</script>
