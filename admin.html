<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>maydly 관리자</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#f2f4f0;--sf:#fff;--sf2:#f7f9f6;--bd:#e0e8de;--bd2:#c8d8c4;--tx:#1e2e1e;--mu:#6a8a6a;--mu2:#4a6a4a;--R:#5ab87a;--Rd:#3a9a5a;--Rl:rgba(90,184,122,.12);--ng:#e05050;--ng2:rgba(224,80,80,.1);--safe-bottom:env(safe-area-inset-bottom,0px)}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;max-width:480px;margin:0 auto}
#pinScreen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:40px}
.pin-logo{font-family:Georgia,serif;font-style:italic;font-size:28px;color:var(--mu2);letter-spacing:2px}
.pin-sub{font-size:12px;color:var(--mu);margin-top:-16px}
.pin-dots{display:flex;gap:12px;margin:8px 0}
.pin-dot{width:12px;height:12px;border-radius:50%;background:var(--bd2);transition:background .15s}
.pin-dot.on{background:var(--R)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:260px}
.pin-btn{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:18px;font-size:22px;font-weight:500;color:var(--tx);cursor:pointer;text-align:center}
.pin-btn:active{background:var(--sf2)}
.pin-btn.del{font-size:18px;color:var(--mu)}
.pin-err{font-size:12px;color:var(--ng);height:16px;text-align:center}
.hdr{position:sticky;top:0;z-index:100;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px}
.hdr-logo{font-family:Georgia,serif;font-style:italic;font-size:17px;color:var(--mu2);letter-spacing:1px}
.hdr-badge{font-size:10px;background:var(--Rl);color:var(--Rd);padding:2px 8px;border-radius:10px;font-weight:700}
.sync-btn{background:var(--R);border:none;border-radius:10px;color:#fff;font-size:12px;font-weight:700;padding:7px 14px;cursor:pointer}
.sync-btn.loading{background:var(--bd2);color:var(--mu)}
.mon-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px}
.mon-label{font-size:18px;font-weight:700;color:var(--tx)}
.mon-arrow{background:var(--sf);border:1px solid var(--bd);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--mu2)}
.cal-wrap{padding:0 12px 12px}
.dow-hdr{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.dow-lbl{text-align:center;font-size:10px;color:var(--mu);font-weight:700;padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.day-cell{background:var(--sf);border-radius:10px;padding:6px 4px 8px;min-height:68px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.day-cell:active{background:var(--sf2)}
.day-cell.dim{opacity:.3;pointer-events:none}
.day-cell.today .day-num{background:var(--R);color:#fff;border-radius:50%}
.day-num{font-size:11px;font-weight:600;color:var(--tx);width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.day-num.sun{color:#e05050}
.day-num.sat{color:#5080e0}
.day-chips{display:flex;flex-direction:column;gap:2px;width:100%;align-items:center}
.day-chip{font-size:7px;font-weight:700;padding:1px 5px;border-radius:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90%;text-align:center}
.chip-unavail{background:#fde;color:#c04040}
.chip-avail{background:rgba(90,184,122,.18);color:#2a7a4a}
.chip-partial{background:rgba(255,180,0,.18);color:#8a6000}
.chip-full-ng{background:rgba(224,80,80,.12);color:#c04040}
.sheet-bg{position:fixed;inset:0;background:rgba(20,30,20,.4);z-index:200;display:none;backdrop-filter:blur(2px)}
.sheet-bg.on{display:block}
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--sf);border-radius:20px 20px 0 0;z-index:201;padding:0 0 calc(20px + var(--safe-bottom));max-height:90vh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;background:var(--bd2);border-radius:2px;margin:12px auto 16px}
.sheet-title{font-size:16px;font-weight:700;padding:0 20px 14px;border-bottom:1px solid var(--bd)}
.sheet-date{font-size:12px;color:var(--mu);font-weight:400;margin-left:8px}
.unavail-row{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bd)}
.unavail-label{display:flex;flex-direction:column;gap:2px}
.unavail-label span:first-child{font-size:14px;font-weight:600;color:var(--tx)}
.unavail-label span:last-child{font-size:11px;color:var(--mu)}
.toggle{width:48px;height:28px;border-radius:14px;background:var(--bd2);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--ng)}
.toggle::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.toggle.on::after{transform:translateX(20px)}
.slots-section{padding:14px 20px}
.slots-label{font-size:11px;font-weight:700;color:var(--mu);margin-bottom:10px;letter-spacing:.5px}
.slot-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-radius:12px;border:1.5px solid var(--bd);margin-bottom:8px;cursor:pointer;background:var(--sf)}
.slot-row.avail{border-color:var(--R);background:var(--Rl)}
.slot-row.blocked{border-color:#e0c0c0;background:var(--ng2)}
.slot-time{font-size:15px;font-weight:600;color:var(--tx)}
.slot-status{font-size:11px;font-weight:700}
.slot-row.avail .slot-status{color:var(--Rd)}
.slot-row.blocked .slot-status{color:var(--ng)}
.label-section{padding:0 20px 6px;border-top:1px solid var(--bd);margin-top:4px}
.label-section .slots-label{padding-top:14px}
.label-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.label-chip{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;border:1.5px solid var(--bd);cursor:pointer;background:var(--sf)}
.label-chip.selected{border-width:2px}
.label-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.label-name{font-size:12px;font-weight:600;color:var(--tx)}
.memo-section{padding:0 20px 16px}
.memo-input{width:100%;border:1.5px solid var(--bd);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--tx);background:var(--sf);resize:none;font-family:inherit;min-height:60px}
.memo-input:focus{outline:none;border-color:var(--R)}
.save-row{padding:0 20px 4px;display:flex;gap:10px}
.save-btn{flex:1;background:var(--R);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;padding:15px;cursor:pointer}
.clear-btn{background:var(--sf);border:1.5px solid var(--bd);border-radius:12px;color:var(--mu);font-size:13px;font-weight:600;padding:15px 18px;cursor:pointer}
.toast{position:fixed;bottom:calc(30px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:var(--tx);color:#fff;padding:10px 22px;border-radius:30px;font-size:12px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
</style>
</head>
<body>
<div id="pinScreen">
  <div class="pin-logo">maydly</div>
  <div class="pin-sub">관리자 로그인</div>
  <div class="pin-dots">
    <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-err" id="pinErr"></div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinInput('1')">1</button>
    <button class="pin-btn" onclick="pinInput('2')">2</button>
    <button class="pin-btn" onclick="pinInput('3')">3</button>
    <button class="pin-btn" onclick="pinInput('4')">4</button>
    <button class="pin-btn" onclick="pinInput('5')">5</button>
    <button class="pin-btn" onclick="pinInput('6')">6</button>
    <button class="pin-btn" onclick="pinInput('7')">7</button>
    <button class="pin-btn" onclick="pinInput('8')">8</button>
    <button class="pin-btn" onclick="pinInput('9')">9</button>
    <button class="pin-btn" style="visibility:hidden"></button>
    <button class="pin-btn" onclick="pinInput('0')">0</button>
    <button class="pin-btn del" onclick="pinDel()">&#9003;</button>
  </div>
</div>
<div id="mainApp" style="display:none">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:8px">
      <div class="hdr-logo">maydly</div>
      <div class="hdr-badge">관리자</div>
    </div>
    <button class="sync-btn" id="syncBtn" onclick="syncToGithub()">&#128190; 저장</button>
  </div>
  <div class="mon-nav">
    <button class="mon-arrow" onclick="chMonth(-1)">&#8249;</button>
    <div class="mon-label" id="monLabel"></div>
    <button class="mon-arrow" onclick="chMonth(1)">&#8250;</button>
  </div>
  <div class="cal-wrap">
    <div class="dow-hdr">
      <div class="dow-lbl" style="color:#e05050">일</div>
      <div class="dow-lbl">월</div><div class="dow-lbl">화</div>
      <div class="dow-lbl">수</div><div class="dow-lbl">목</div>
      <div class="dow-lbl">금</div>
      <div class="dow-lbl" style="color:#5080e0">토</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>
<div class="sheet-bg" id="sheetBg" onclick="closeSheet()"></div>
<div class="sheet" id="sheet" style="display:none">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheetTitle"></div>
  <div class="unavail-row">
    <div class="unavail-label">
      <span>종일 예약 불가</span>
      <span>휴무 / 외부 추영 등 하루 전체 불가</span>
    </div>
    <div class="toggle" id="unavailToggle" onclick="toggleUnavail()"></div>
  </div>
  <div class="slots-section" id="slotsSection">
    <div class="slots-label">예약 가능 타임</div>
    <div id="slotRows"></div>
  </div>
  <div class="label-section">
    <div class="slots-label">라벨</div>
    <div class="label-grid" id="labelGrid"></div>
  </div>
  <div class="memo-section">
    <div class="slots-label" style="margin-bottom:8px">메모</div>
    <textarea class="memo-input" id="memoInput" placeholder="예: 합주 있음, 오전 외출 등"></textarea>
  </div>
  <div class="save-row">
    <button class="clear-btn" onclick="clearDay()">초기화</button>
    <button class="save-btn" onclick="saveDay()">확인</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script type="text/javascript">
var _t1="ghp_61Ji",_t2="eReKhRqw",_t3="V39K7D6z",_t4="ymvFRhHI",_t5="ji1lARiY";
var GHT=_t1+_t2+_t3+_t4+_t5;
var PIN="0825",GH_REPO="bucket0825/maydly",GH_FILE="public-data.json";
var LABELS=[
  {id:"nam",name:"남스튜디오",color:"#22c47a"},{id:"yeo",name:"여스튜디오",color:"#f472b6"},
  {id:"out",name:"야외",color:"#60a5fa"},{id:"pro",name:"프로필페이",color:"#fb923c"},
  {id:"com",name:"야외상업",color:"#2dd4bf"},{id:"pa",name:"PA촬영",color:"#a78bfa"},
  {id:"off",name:"휴무",color:"#f87171"},{id:"free",name:"무페이",color:"#4ade80"},
  {id:"nosh",name:"노쇼",color:"#1e1e1e"}
];
var WD=[{s:"14:00",e:"16:00"},{s:"17:00",e:"19:00"},{s:"20:00",e:"22:00"}];
var WE=[{s:"11:00",e:"13:00"},{s:"14:00",e:"16:00"},{s:"17:00",e:"19:00"},{s:"20:00",e:"22:00"}];
var pinBuf="",curDate=new Date(),schedule={},editDs=null,editState={};
function pinInput(n){if(pinBuf.length>=4)return;pinBuf+=n;updDots();if(pinBuf.length===4)setTimeout(checkPin,80);}
function pinDel(){pinBuf=pinBuf.slice(0,-1);updDots();document.getElementById("pinErr").textContent="";}
function updDots(){for(var i=0;i<4;i++){var d=document.getElementById("pd"+i);i<pinBuf.length?d.classList.add("on"):d.classList.remove("on");}}
function checkPin(){
  if(pinBuf===PIN){document.getElementById("pinScreen").style.display="none";document.getElementById("mainApp").style.display="block";loadData();}
  else{document.getElementById("pinErr").textContent="핀 번호가 틀렸습니다";;pinBuf="";updDots();}
}
function loadData(){
  fetch("https://raw.githubusercontent.com/"+GH_REPO+"/main/"+GH_FILE+"?t="+Date.now())
  .then(function(r){return r.json();}).then(function(d){schedule=d.schedule||{};renderCal();}).catch(function(){renderCal();});
}
function fd(d){var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),dd=String(d.getDate()).padStart(2,"0");return y+"-"+m+"-"+dd;}
function parseDs(ds){var p=ds.split("-").map(Number);return new Date(p[0],p[1]-1,p[2]);}
function isWE(ds){var w=parseDs(ds).getDay();return w===0||w===6;}
function defSlots(ds){return(isWE(ds)?WE:WD).map(function(s){return{s:s.s,e:s.e,avail:true};});}
function chMonth(n){curDate.setMonth(curDate.getMonth()+n);renderCal();}
function renderCal(){
  var y=curDate.getFullYear(),m=curDate.getMonth();
  var ms=["월1월","월2월","월3월","월4월","월5월","월6월","월7월","월8월","월9월","10월","11월","12월"];
  document.getElementById("monLabel").textContent=y+"년 "+ms[m];
  var today=fd(new Date()),first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),prev=new Date(y,m,0).getDate();
  var html="";
  for(var i=0;i<first;i++)html+=dayCell(fd(new Date(y,m-1,prev-first+1+i)),prev-first+1+i,true,today);
  for(var d=1;d<=days;d++)html+=dayCell(fd(new Date(y,m,d)),d,false,today);
  var rem=(7-(first+days)%7)%7;
  for(var d2=1;d2<=rem;d2++)html+=dayCell(fd(new Date(y,m+1,d2)),d2,true,today);
  document.getElementById("calGrid").innerHTML=html;
}
function dayCell(ds,dn,dim,today){
  var sc=schedule[ds],dow=parseDs(ds).getDay(),isT=ds===today,chips="";
  if(sc){
    if(sc.unavailable){chips="<div class=\"day-chip chip-unavail\">불가</div>";}
    else if(sc.slots){
      var av=sc.slots.filter(function(s){return s.avail;}).length,tot=sc.slots.length;
      if(av===0)chips="<div class=\"day-chip chip-full-ng\">만료</div>";
      else if(av<tot)chips="<div class=\"day-chip chip-partial\">"+av+"/"+tot+"타임</div>";
      else chips="<div class=\"day-chip chip-avail\">"+av+"타임</div>";
    }
    if(sc.label){var lb=LABELS.find(function(l){return l.id===sc.label;});if(lb)chips+="<div class=\"day-chip\" style=\"background:"+lb.color+"22;color:"+lb.color+"\">"+lb.name.substring(0,4)+"</div>";}
  }
  var nc=dow===0?"day-num sun":dow===6?"day-num sat":"day-num";
  return "<div class=\"day-cell"+(dim?" dim":"")+(isT?" today":"")+"" onclick=\"openSheet('"+ds+"')\">"+"<div class=\""+nc+"\">"+dn+"</div><div class=\"day-chips\">"+chips+"</div></div>";
}
function openSheet(ds){
  editDs=ds;var sc=schedule[ds]||{};var p=ds.split("-").map(Number);
  var DAYS=["일","월","화","수","목","금","토"],dow=parseDs(ds).getDay();
  document.getElementById("sheetTitle").innerHTML=p[0]+"년 "+p[1]+"월 "+p[2]+"일 <span class=\"sheet-date\">("+DAYS[dow]+")</span>";
  editState={unavailable:sc.unavailable||false,slots:sc.slots?sc.slots.map(function(s){return{s:s.s,e:s.e,avail:s.avail};}):defSlots(ds),label:sc.label||null,memo:sc.memo||""};
  renderSheet();
  document.getElementById("sheetBg").classList.add("on");
  document.getElementById("sheet").style.display="block";
}
function renderSheet(){
  var tog=document.getElementById("unavailToggle");
  editState.unavailable?tog.classList.add("on"):tog.classList.remove("on");
  var sec=document.getElementById("slotsSection");
  sec.style.opacity=editState.unavailable?".35":"1";
  sec.style.pointerEvents=editState.unavailable?"none":"auto";
  var sh="";
  editState.slots.forEach(function(s,i){
    var cls=s.avail?"avail":"blocked",lbl=s.avail?"O 예약 가능":"X 예약 불가";
    sh+="<div class=\"slot-row "+cls+"\" onclick=\"toggleSlot("+i+")\"><div class=\"slot-time\">"+s.s+" ~ "+s.e+"</div><div class=\"slot-status\">"+lbl+"</div></div>";
  });
  document.getElementById("slotRows").innerHTML=sh;
  var lh="";
  LABELS.forEach(function(lb){
    var sel=editState.label===lb.id;
    lh+="<div class=\"label-chip"+(sel?" selected":"")+"" style=\"backgroundXXX\" onclick=\"selectLabel('"+lb.id+"')\">"+"<div class=\"label-dot\" style=\"background:"+lb.color+"\"></div><div class=\"label-name\">"+lb.name+"</div></div>";
  });
  document.getElementById("labelGrid").innerHTML=lh.replace(/backgroundXXX/g,function(){return "";});
  document.getElementById("memoInput").value=editState.memo;
}
function toggleUnavail(){editState.unavailable=!editState.unavailable;renderSheet();}
function toggleSlot(i){editState.slots[i].avail=!editState.slots[i].avail;renderSheet();}
function selectLabel(id){editState.label=editState.label===id?null:id;renderSheet();}
function saveDay(){
  if(editState.unavailable){schedule[editDs]={unavailable:true};if(editState.label)schedule[editDs].label=editState.label;if(editState.memo)schedule[editDs].memo=editState.memo;}
  else{var hc=editState.slots.some(function(s){return!s.avail;});
    if(!hc&&!editState.label&&!editState.memo){delete schedule[editDs];}
    else{schedule[editDs]={slots:editState.slots.map(function(s){return{s:s.s,e:s.e,avail:s.avail};})};if(editState.label)schedule[editDs].label=editState.label;if(editState.memo)schedule[editDs].memo=editState.memo;}
  }
  closeSheet();renderCal();showToast("저장됨 (&#128190; 버튼으로 GitHub 업로드)");
}
function clearDay(){delete schedule[editDs];closeSheet();renderCal();showToast("초기화됨");}
function closeSheet(){document.getElementById("sheetBg").classList.remove("on");document.getElementById("sheet").style.display="none";editDs=null;}
function syncToGithub(){
  var btn=document.getElementById("syncBtn");
  btn.textContent="업로드 중...";btn.classList.add("loading");
  fetch("https://api.github.com/repos/"+GH_REPO+"/contents/"+GH_FILE,{headers:{"Authorization":"token "+GHT}})
  .then(function(r){return r.json();})
  .then(function(sd){
    var pd={generated:new Date().toISOString(),schedule:schedule};
    var ct=btoa(unescape(encodeURIComponent(JSON.stringify(pd,null,2))));
    return fetch("https://api.github.com/repos/"+GH_REPO+"/contents/"+GH_FILE,{method:"PUT",headers:{"Authorization":"token "+GHT,"Accept":"application/vnd.github.v3+json","Content-Type":"application/json"},body:JSON.stringify({message:"Admin update",content:ct,sha:sd.sha})});
  })
  .then(function(r){return r.json();})
  .then(function(r){showToast(r.content?"배포 완료!":"실패: "+(r.message||""));btn.textContent="&#128190; 저장";btn.classList.remove("loading");})
  .catch(function(e){showToast("오류: "+e.message);btn.textContent="&#128190; 저장";btn.classList.remove("loading");});
}
function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("on");setTimeout(function(){t.classList.remove("on");},2800);}
renderCal();
</script>
</body>
</html>
